# homekit-camera-proxy configuration
#
# Values may reference environment variables with ${VAR_NAME}; the process
# exits at startup if a referenced variable is unset.
#
# Each camera is published as its own standalone HomeKit accessory (not a
# bridge): HAP serializes requests per connection, so bridged cameras would
# delay each other's snapshots. Pair each camera individually (same PIN).

hap:
  # HomeKit pairing PIN, format XXX-XX-XXX. Override with HKCP_PINCODE env var.
  pincode: "031-45-154"
  # Camera N listens on basePort+N (or set hapPort per camera).
  basePort: 51826
  # Seed for each accessory's stable identity (combined with the camera name).
  # Changing it — or renaming a camera — unpairs that accessory from HomeKit.
  usernameSeed: frigate-cameras-v1

frigate:
  # Frigate's internal (unauthenticated) API — snapshots + /ws motion events.
  apiBaseUrl: http://frigate.frigate.svc.cluster.local:5000
  # go2rtc RTSP restream base.
  rtspBaseUrl: rtsp://frigate.frigate.svc.cluster.local:8554
  # Auto-discover cameras from Frigate's config API on startup. Each enabled
  # camera with a go2rtc restream is published automatically (main = <name>,
  # sub = <name>_sub if it exists, audio on, motion = person). Set false to
  # use only the cameras listed below.
  discover: true

# HAP pairing state lives here — must be persistent across restarts.
persistDir: /data/persist

healthPort: 9891

# Path to an ffmpeg with libfdk_aac (bundled in the Docker image).
ffmpegPath: ffmpeg

# With discovery on, this list is OPTIONAL and holds overrides. An entry is
# matched to a discovered camera by `frigateName`; the fields you set win,
# the rest come from discovery. An entry whose `frigateName` isn't in Frigate
# is treated as a fully-manual camera (must then supply name + streams.main).
cameras:
  # Override a discovered camera: add a low-res sub stream + two-way audio
  # (one-way audio is already on from discovery), widen motion labels.
  - frigateName: front_yard
    streams:
      sub: rtsp://admin:${AMCREST_RTSP_PASSWORD}@192.168.2.13:554/cam/realmonitor?channel=1&subtype=1
    twoWayAudio: true
    motion:
      labels: [person, car]

  # A doorbell discovery can't infer: two-way audio + ONVIF ring events.
  - frigateName: doorbell
    audio: true
    twoWayAudio: true
    doorbell:
      onvif:
        host: 192.168.4.100
        port: 8000
        username: admin
        password: ${ONVIF_DOORBELL_PASSWORD}

  # A camera Frigate doesn't manage — fully manual (no discovery match).
  # - frigateName: garage
  #   name: Garage
  #   streams:
  #     main: rtsp://user:${GARAGE_PASSWORD}@192.168.2.20:554/stream1
